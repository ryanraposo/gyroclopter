name: build-artifacts

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build:icons
      - run: npm run build:win
      - name: Smoke-test the .exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -LiteralPath "dist" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "No .exe found in dist/"; exit 1 }
          Write-Host "Smoke test: $($exe.Name) exists"
      - id: upload-win
        uses: mmkal/artifact.ci/upload@main
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error
          artifactci-visibility: public

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build:icons
      - run: npm run build:linux
      - name: Smoke-test the .deb
        run: |
          set -e
          DEB=$(ls dist/*.deb | head -1)
          dpkg-deb -I "$DEB"
          echo "Smoke test passed: $(basename $DEB) is valid"
      - id: upload-linux
        uses: mmkal/artifact.ci/upload@main
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error
          artifactci-visibility: public

  post-artifacts:
      needs: [build-windows, build-linux]
      runs-on: ubuntu-latest
      if: github.event_name == 'pull_request'
      steps:
        - uses: actions/github-script@v7
          with:
            script: |
              const prNumber = context.payload.pull_request?.number;
              if (!prNumber) return;
            
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber
              });
            
              const artifactComments = comments.filter(c => 
                c.user?.type === 'Bot' && c.body?.includes('Build Artifacts Ready')
              );
            
              // Delete all previous artifact comments
              for (const comment of artifactComments) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id
                });
              }
            
              const winUrl = '${{ steps.upload-win.outputs.artifactci_run_url }}';
                          const linuxUrl = '${{ steps.upload-linux.outputs.artifactci_run_url }}';
            
                          await github.rest.issues.createComment({
                            owner: context.repo.owner,
                            repo: context.repo.repo,
                            issue_number: prNumber,
                            body: `## ✅ Build Artifacts Ready\n\n| Platform | Download |\n|----------|----------|\n| Windows | [\${{ github.event.repository.name }}.exe](${winUrl}) |\n| Linux | [\${{ github.event.repository.name }}.deb](${linuxUrl}) |\n\n> Direct links via artifact.ci (90-day retention).`
                          });

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      - name: Generate release notes
        id: release_notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD > /tmp/release_notes.md
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/release_notes.md >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "RELEASE_NOTES=Initial release" >> $GITHUB_OUTPUT
          fi
      - uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            CHANGELOG.md