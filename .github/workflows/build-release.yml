name: build-release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '22'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - run: npm ci
      - run: npm test

  build-windows:
    needs: test
    runs-on: windows-latest
    outputs:
      artifact-url: ${{ steps.upload-artifact-url.outputs.url }}
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run build:icons

      - name: Build Windows installer
        run: npm run build:win

      - name: Smoke-test the .exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -LiteralPath "dist" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in dist/"
            exit 1
          }
          Write-Host "Smoke test: $($exe.Name) exists"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v5
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

      - name: Get artifact URL
        id: upload-artifact-url
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ github.run_attempt }}" >> $GITHUB_OUTPUT

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      artifact-url: ${{ steps.upload-artifact-url.outputs.url }}
    steps:
      - uses: actions/checkout@v5
      
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run build:icons

      - name: Build Linux package
        run: npm run build:linux

      - name: Smoke-test the .deb
        run: |
          set -e
          DEB=$(ls dist/*.deb | head -1)
          dpkg-deb -I "$DEB"
          echo "Smoke test passed: $(basename $DEB) is valid"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v5
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error

      - name: Get artifact URL
        id: upload-artifact-url
        run: |
          echo "url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts/${{ github.run_attempt }}" >> $GITHUB_OUTPUT

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v5
      
      - name: Post build artifacts comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const comment = `## ✅ Build Artifacts Ready\n\n| Platform | Artifact |\n|----------|----------|\n| Windows | [Download .exe](${artifactUrl}) |\n| Linux | [Download .deb](${artifactUrl}) |\n\n> Click the links above to download the built binaries from this workflow run. Artifacts are retained for 60 days.`;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: comment
            });
      
      - uses: actions/download-artifact@v5
        with:
          path: artifacts
      
      - name: Generate release notes
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from $PREV_TAG to ${{ github.ref_name }}"
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD > /tmp/release_notes.md
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/release_notes.md >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No previous tag found, using default notes"
            echo "RELEASE_NOTES=Initial release" >> $GITHUB_OUTPUT
          fi

      - name: Publish release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            CHANGELOG.md

      - name: Update draft release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: "latest (draft — verify before publishing)"
          draft: true
          prerelease: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb