name: Build & Release

on:
  push:
    branches: [main, dev]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Build binary (nexe)
        run: node scripts/build-binary.js --build
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Build installer (NSIS)
        run: npm run build:win-installer
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        with:
          name: gyroclopter-windows
          path: dist/*.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci

      - name: Build icons
        run: npm run build:icons

      - name: Install deb packaging tools
        run: sudo apt-get update && sudo apt-get install -y dpkg-dev

      - name: Build binary (nexe)
        run: node scripts/build-binary.js

      - name: Build .deb
        run: npm run build:linux

      - uses: actions/upload-artifact@v4
        with:
          name: gyroclopter-linux
          path: dist/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - run: |
          mkdir -p dist
          cp gyroclopter-windows/*.exe dist/
          cp gyroclopter-linux/*.deb dist/
      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: false
