name: build-release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm ci
      - run: npm test

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run build:icons

      - name: Build Windows installer
        run: npm run build:win

      - name: Smoke-test the .exe
        shell: pwsh
        run: |
          $exe = Get-ChildItem -LiteralPath "dist" -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No .exe found in dist/"
            exit 1
          }
          Write-Host "Smoke test: $($exe.Name) exists"
          # Basic validation - could add more here
          exit 0

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run build:icons

      - name: Build Linux package
        run: npm run build:linux

      - name: Smoke-test the .deb
        run: |
          set -e
          DEB=$(ls dist/*.deb | head -1)
          dpkg-deb -I "$DEB"
          echo "Smoke test passed: $(basename $DEB) is valid"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb
          if-no-files-found: error

  # Generate changelog when creating releases
  changelog:
    runs-on: ubuntu-latest
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for changelog generation
      
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install changelog generator
        run: npm install -g conventional-changelog-cli

      - name: Generate changelog
        run: |
          # Generate changelog from git history
          conventional-changelog -p angular -i CHANGELOG.md -s -r 0
          
          # Show what was generated
          echo "=== CHANGELOG.md (last 50 lines) ==="
          tail -50 CHANGELOG.md

      - name: Commit changelog
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'docs: update CHANGELOG.md for release ${{ github.ref_name }}'
          file_pattern: CHANGELOG.md
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      # Auto-generate release notes from conventional commits
      - name: Generate release notes
        id: release_notes
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          
          if [ -n "$PREV_TAG" ]; then
            echo "Generating notes from $PREV_TAG to ${{ github.ref_name }}"
            # Generate release notes using git log
            git log --pretty=format:"* %s (%h)" $PREV_TAG..HEAD > /tmp/release_notes.md
            echo "RELEASE_NOTES<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/release_notes.md >> $GITHUB_OUTPUT
            echo "" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "No previous tag found, using default notes"
            echo "RELEASE_NOTE=Initial release" >> $GITHUB_OUTPUT
          fi

      - name: Publish release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb
            CHANGELOG.md

      - name: Update draft release (main push)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "latest (draft — verify before publishing)"
          draft: true
          prerelease: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.deb