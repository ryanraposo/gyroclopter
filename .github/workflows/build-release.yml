name: build-release

on:
  push:
    branches:
      - main

jobs:
  build-deb:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build .deb
        run: npx electron-builder --linux deb --publish never

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: gyroclopter-deb
          path: dist/*.deb
          if-no-files-found: error

  build-exe:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build .exe
        run: npx electron-builder --win nsis --publish never

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: gyroclopter-exe
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs:
      - build-deb
      - build-exe
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          echo "VERSION=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: gyroclopter-deb
          path: dist/

      - name: Download .exe artifact
        uses: actions/download-artifact@v4
        with:
          name: gyroclopter-exe
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          files: |
            dist/*.deb
            dist/*.exe
          draft: false
          prerelease: false
