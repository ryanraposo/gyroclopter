name: Build EXE (manual)

# This workflow is triggered manually to generate a Windows executable.
# Previously this might have been run automatically on pushes.
# Turning it into a manual workflow allows developers to run it on demand.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag/version for the EXE'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build EXE (placeholder)
        # Replace this with actual build command, e.g., npx pkg . --output gyroclopter.exe
        run: |
          echo "Running EXE generation..."
          # Example command (uncomment when ready):
          # npx pkg . --targets node20-win-x64 --output gyroclopter.exe

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gyroclopter-exe
          path: ./gyroclopter.exe
